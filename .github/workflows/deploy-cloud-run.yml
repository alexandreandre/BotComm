# Un seul service Cloud Run : API Fastify + bot Playwright + SPA (static dans l’image, FRONTEND_DIST_PATH).
name: Deploy Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || vars.BACKEND_SERVICE_NAME || 'cinecontent-bot-dispatcher' }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'cloud-run-images' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sans valeur, auth@v2 considère qu’aucun mode n’est fourni → erreur peu claire.
      - name: Vérifier le secret GCP_SA_KEY
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GCP_SA_KEY est vide ou absent. Repo → Settings → Secrets and variables → Actions : crée le secret avec le JSON du compte de service GCP. Les PR depuis forks / Dependabot n’ont pas accès aux secrets."
            exit 1
          fi

      # Clé JSON du compte de service (secret GCP_SA_KEY)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and Push Image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Secrets GitHub OU variables (ex. VITE_SUPABASE_PUBLISHABLE_KEY = ancienne clé anon)
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Définis SUPABASE_URL + SUPABASE_ANON_KEY (secrets) ou VITE_SUPABASE_URL + VITE_SUPABASE_PUBLISHABLE_KEY (variables)."
            exit 1
          fi
          # VITE_API_BASE_URL vide → le navigateur appelle /api sur la même origine (Cloud Run).
          docker build -t "${IMAGE_URI}" \
            --build-arg "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
            --build-arg "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" \
            --build-arg "VITE_API_BASE_URL=" \
            .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          GCS_BUCKET_DEPLOY: ${{ vars.GCS_BUCKET }}
          PUBLIC_APP_URL_VAR: ${{ vars.PUBLIC_APP_URL }}
          SUPABASE_SERVICE_ROLE_KEY_DEPLOY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL_DEPLOY: ${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          STORAGE_BACKEND_DEPLOY: ${{ vars.STORAGE_BACKEND || 'supabase' }}
          DEFAULT_STORAGE_BUCKET_DEPLOY: ${{ vars.DEFAULT_STORAGE_BUCKET || 'gameplay-videos' }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const e = process.env;
          if (!String(e.SUPABASE_SERVICE_ROLE_KEY_DEPLOY || "").trim()) {
            console.error("Secret GitHub SUPABASE_SERVICE_ROLE_KEY manquant.");
            process.exit(1);
          }
          if (!String(e.SUPABASE_URL_DEPLOY || "").trim()) {
            console.error("SUPABASE_URL manquant (secret ou variable VITE_SUPABASE_URL).");
            process.exit(1);
          }
          const pairs = {
            NODE_ENV: "production",
            LOG_LEVEL: "info",
            FRONTEND_DIST_PATH: "/app/frontend-dist",
            BODY_LIMIT_BYTES: "5242880",
            STORAGE_BACKEND: e.STORAGE_BACKEND_DEPLOY || "supabase",
            SUPABASE_URL: String(e.SUPABASE_URL_DEPLOY).trim(),
            SUPABASE_SERVICE_ROLE_KEY: e.SUPABASE_SERVICE_ROLE_KEY_DEPLOY,
            DEFAULT_STORAGE_BUCKET: e.DEFAULT_STORAGE_BUCKET_DEPLOY || "gameplay-videos",
            PLAYWRIGHT_HEADLESS: "true",
            PLAYWRIGHT_NAV_TIMEOUT_MS: "30000",
            WEBHOOK_TIMEOUT_MS: "10000",
            MAX_RUN_TIMEOUT_MS: "120000",
            RUN_CONCURRENCY_LIMIT: "2"
          };
          if (String(e.PUBLIC_APP_URL_VAR || "").trim()) {
            pairs.PUBLIC_APP_URL = String(e.PUBLIC_APP_URL_VAR).trim();
          }
          if (String(e.GCS_BUCKET_DEPLOY || "").trim()) {
            pairs.GCS_BUCKET = String(e.GCS_BUCKET_DEPLOY).trim();
          }
          const yaml =
            Object.entries(pairs)
              .map(([k, v]) => `${k}: ${JSON.stringify(String(v))}`)
              .join("\n") + "\n";
          fs.writeFileSync("/tmp/cloudrun-env.yaml", yaml);
          NODE
          chmod 600 /tmp/cloudrun-env.yaml
          # Un seul --env-vars-file : évite les bugs de fusion file + --set-env-vars.
          # Pas de `services update --clear-secrets` ici : ça créait une révision intermédiaire qui échouait au démarrage.
          gcloud run deploy "${SERVICE_NAME}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE_URI}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu-boost \
            --memory=1Gi \
            --env-vars-file=/tmp/cloudrun-env.yaml
          RUN_URL="$(gcloud run services describe "${SERVICE_NAME}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          echo ""
          echo "::notice::URL Cloud Run : ${RUN_URL} — mets-la dans GitHub → Settings → Variables → PUBLIC_APP_URL (sans slash final), puis relance le workflow pour activer le webhook bot."
          echo "$RUN_URL"
