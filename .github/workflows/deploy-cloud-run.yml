name: Deploy Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'cinecontent-bot-dispatcher' }}
  REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and Push Image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE_URI}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "NODE_ENV=production,LOG_LEVEL=info,SUPABASE_URL=${{ secrets.SUPABASE_URL }},DEFAULT_STORAGE_BUCKET=${{ vars.DEFAULT_STORAGE_BUCKET || 'gameplay-videos' }},PLAYWRIGHT_HEADLESS=true,PLAYWRIGHT_NAV_TIMEOUT_MS=30000,WEBHOOK_TIMEOUT_MS=10000,MAX_RUN_TIMEOUT_MS=120000,RUN_CONCURRENCY_LIMIT=2" \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest"
