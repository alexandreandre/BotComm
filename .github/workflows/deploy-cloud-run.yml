# Un seul service Cloud Run : API Fastify + bot Playwright + SPA (static dans l’image, FRONTEND_DIST_PATH).
name: Deploy Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || vars.BACKEND_SERVICE_NAME || 'cinecontent-bot-dispatcher' }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'cloud-run-images' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sans valeur, auth@v2 considère qu’aucun mode n’est fourni → erreur peu claire.
      - name: Vérifier le secret GCP_SA_KEY
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GCP_SA_KEY est vide ou absent. Repo → Settings → Secrets and variables → Actions : crée le secret avec le JSON du compte de service GCP. Les PR depuis forks / Dependabot n’ont pas accès aux secrets."
            exit 1
          fi

      # Clé JSON du compte de service (secret GCP_SA_KEY)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and Push Image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Secrets GitHub OU variables (ex. VITE_SUPABASE_PUBLISHABLE_KEY = ancienne clé anon)
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Définis SUPABASE_URL + SUPABASE_ANON_KEY (secrets) ou VITE_SUPABASE_URL + VITE_SUPABASE_PUBLISHABLE_KEY (variables)."
            exit 1
          fi
          # VITE_API_BASE_URL vide → le navigateur appelle /api sur la même origine (Cloud Run).
          docker build -t "${IMAGE_URI}" \
            --build-arg "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
            --build-arg "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" \
            --build-arg "VITE_API_BASE_URL=" \
            .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          GCS_BUCKET_DEPLOY: ${{ vars.GCS_BUCKET }}
          PUBLIC_APP_URL_VAR: ${{ vars.PUBLIC_APP_URL }}
          # Clé service_role : fichier YAML (évite troncature / caractères spéciaux dans --set-env-vars).
          SUPABASE_SERVICE_ROLE_KEY_DEPLOY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY_DEPLOY:-}" ]; then
            echo "::error::Secret GitHub SUPABASE_SERVICE_ROLE_KEY manquant (Project Settings → API → service_role)."
            exit 1
          fi
          node -e "require('fs').writeFileSync('/tmp/cloudrun-role.yaml','SUPABASE_SERVICE_ROLE_KEY: '+JSON.stringify(process.env.SUPABASE_SERVICE_ROLE_KEY_DEPLOY)+'\n')"
          chmod 600 /tmp/cloudrun-role.yaml
          EXTRA_ENV=""
          if [ -n "${GCS_BUCKET_DEPLOY:-}" ]; then
            EXTRA_ENV=",GCS_BUCKET=${GCS_BUCKET_DEPLOY}"
          fi
          SET_ENV="NODE_ENV=production,LOG_LEVEL=info,FRONTEND_DIST_PATH=/app/frontend-dist,BODY_LIMIT_BYTES=5242880,STORAGE_BACKEND=${{ vars.STORAGE_BACKEND || 'supabase' }},SUPABASE_URL=${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }},DEFAULT_STORAGE_BUCKET=${{ vars.DEFAULT_STORAGE_BUCKET || 'gameplay-videos' }},PLAYWRIGHT_HEADLESS=true,PLAYWRIGHT_NAV_TIMEOUT_MS=30000,WEBHOOK_TIMEOUT_MS=10000,MAX_RUN_TIMEOUT_MS=120000,RUN_CONCURRENCY_LIMIT=2"
          if [ -n "${PUBLIC_APP_URL_VAR:-}" ]; then
            SET_ENV="${SET_ENV},PUBLIC_APP_URL=${PUBLIC_APP_URL_VAR}"
          fi
          SET_ENV="${SET_ENV}${EXTRA_ENV}"
          # Cloud Run : une variable ne peut pas passer de Secret Manager → littéral dans le même `deploy`.
          if gcloud run services describe "${SERVICE_NAME}" --project "${PROJECT_ID}" --region "${REGION}" &>/dev/null; then
            gcloud run services update "${SERVICE_NAME}" \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --clear-secrets \
              --quiet
          fi
          gcloud run deploy "${SERVICE_NAME}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --image "${IMAGE_URI}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu-boost \
            --memory=1Gi \
            --env-vars-file=/tmp/cloudrun-role.yaml \
            --set-env-vars "${SET_ENV}"
          RUN_URL="$(gcloud run services describe "${SERVICE_NAME}" --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')"
          echo ""
          echo "::notice::URL Cloud Run : ${RUN_URL} — mets-la dans GitHub → Settings → Variables → PUBLIC_APP_URL (sans slash final), puis relance le workflow pour activer le webhook bot."
          echo "$RUN_URL"
